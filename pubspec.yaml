name: dart_tracker
description: Track your dart training, finishes and personal milestones.
publish_to: "none"

version: 1.3.0+4

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  fl_chart: ^1.0.0
  drift: ^2.28.1
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  file_picker: ^10.3.2
  flutter_file_dialog: ^3.3.1
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.28.1
  build_runner: ^2.5.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icon/app_icon.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"