name: dart_tracker
description: A Flutter application to track high dart scores.
publish_to: "none"

version: 1.2.0+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  fl_chart: ^1.0.0
  drift: ^2.28.1
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  file_picker: ^10.3.2
  flutter_file_dialog: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  drift_dev: ^2.28.1
  build_runner: ^2.5.4

flutter:
  uses-material-design: true